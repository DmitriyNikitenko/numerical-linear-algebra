name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      - name: Test LU
        run: PYTHONPATH=. pytest tests/test_lu.py -v

      - name: Test QR
        run: PYTHONPATH=. pytest tests/test_qr.py -v

      - name: Test Iterative Methods
        run: PYTHONPATH=. pytest tests/test_iterative_methods.py -v

      - name: Test Linear Systems
        run: PYTHONPATH=. pytest tests/test_linear_system.py -v
